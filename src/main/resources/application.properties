spring.application.name=bloodconnect-backend

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/bloodconnect_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${PORT:9292}
server.error.include-stacktrace=never

# ============================================
# SECURITY CONFIGURATION
# ============================================
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
file.upload-dir=${UPLOAD_DIR:c:/Blood Connect/bloodconnect-backend/uploads}
spring.web.resources.static-locations=file:${UPLOAD_DIR:c:/Blood Connect/bloodconnect-backend/uploads}/,classpath:/static/

# ============================================
# OPENROUTER AI CONFIGURATION
# ============================================
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=${OPENROUTER_API_URL:https://openrouter.ai/api/v1}
openrouter.model=${OPENROUTER_MODEL:nvidia/nemotron-3-super-120b-a12b:free}

# ============================================
# CLOUDINARY CONFIGURATION
# ============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dkmjd6trt}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ============================================
# OAUTH CONFIGURATION
# ============================================
oauth.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
oauth.apple.team-id=${APPLE_TEAM_ID:dev-apple-team-id}
oauth.apple.key-id=${APPLE_KEY_ID:dev-apple-key-id}

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=WARN
logging.level.com.bloodconnect=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always
